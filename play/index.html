<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-K9B7R9FY9P"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-K9B7R9FY9P");
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio Wildflower</title>
    <link rel="stylesheet" href="/global/styles.css" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/play/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link
      rel="icon"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='100%' height='100%' fill='%23ffffff'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='Arial,Helvetica,sans-serif' font-size='20' fill='%23333'>MR</text></svg>"
    />
    <script src="/play/script.js" defer></script>
    <script src="/global/nav.js" defer></script>
    <style>
      /* legacy now-playing styles removed – updated in external CSS */
    </style>
  </head>
  <body>
    <!-- Navigation injected by /global/nav.js -->

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-content">
        <div class="spinner"></div>
        <p class="loading-text">Connecting to Radio Wildflower...</p>
      </div>
    </div>

    <!-- Main Content -->
    <main class="play-wrapper">
      <!-- Atmospheric Background -->
      <div class="atmospheric-bg">
        <div class="grid-pattern"></div>
        <div class="radial-glow"></div>
      </div>

      <!-- LIVE Indicator -->
      <div class="live-indicator">
        <div class="live-dot"></div>
        <span class="live-text">LIVE</span>
      </div>

      <!-- Main Player Interface -->
      <div class="player-container">
        <!-- Artist Name (Dominant) -->
        <div class="artist-display">
          <h1 id="currentArtist" class="artist-name">ARTIST NAME</h1>
        </div>

        <!-- Track Name (Secondary) -->
        <div class="track-display">
          <h2 id="currentTrack" class="track-name">Track Name</h2>
        </div>

        <!-- Central Play Button -->
        <div class="play-controls">
          <button
            id="playPauseBtn"
            class="play-button"
            disabled
            aria-label="Play/Pause"
          >
            <div class="play-aura"></div>
            <span class="material-symbols-rounded play-icon">play_arrow</span>
          </button>
        </div>

        <!-- Info Button -->
        <div class="info-controls">
          <button id="infoBtn" class="info-button" aria-label="Info">
            <span class="material-symbols-rounded">info</span>
          </button>
        </div>
      </div>

      <!-- Recently Played Drawer -->
      <div id="recentlyPlayedDrawer" class="drawer">
        <div class="drawer-handle">
          <span class="chevron">^</span>
        </div>
        <div class="drawer-content">
          <h3 class="drawer-title">Recently Played</h3>
          <div id="recentTracks" class="tracks-list">
            <!-- Track entries will be populated here -->
          </div>
        </div>
      </div>

      <!-- Now Playing UI -->
      <div id="nowPlayingUI" class="now-playing-ui">
        <div class="progress-section">
          <div class="time-display">
            <span id="trackCurrentPosition">0:00</span>
          </div>
          <div class="progress-container">
            <progress id="trackProgressMeter" value="0" max="100"></progress>
          </div>
          <div class="time-display">
            <span id="trackDuration">0:00</span>
          </div>
        </div>
        <div class="segment-counter">
          <span id="segmentCounter">Segments played: 0</span>
        </div>
      </div>
    </main>

    <audio id="audio" src=""></audio>

    <!-- Navigation behavior provided by /global/nav.js -->

    <footer id="copyrightText">
      <p>Copyright Radio Wildflower. All rights reserved.</p>
    </footer>
  </body>
</html>
